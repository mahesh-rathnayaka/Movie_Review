{% extends 'main.html' %}
<!--  -->
{% block title %} Register - Movie Review Website{% endblock title %}
<!--  -->
{% block content %}
<main class="bg-gradient-to-b from-slate-950/80 via-slate-950 to-black min-h-screen flex items-center justify-center px-4 py-10">
  <section class="w-full max-w-2xl">
    <form
      action=""
      method="post"
      enctype="multipart/form-data"
      class="bg-pLightPurple/95 text-gray-300 flex flex-col gap-4 w-full rounded-2xl shadow-2xl p-6 md:p-7 border border-white/10"
    >
      {% csrf_token %}
      <header class="text-center mb-2 space-y-1">
        <p class="text-xs font-semibold tracking-[0.25em] uppercase text-pgreen">
          Join us
        </p>
        <p class="font-semibold text-2xl text-white">
          Create an account for free
        </p>
      </header>
        <!-- First name -->
        <div class="flex flex-col gap-2">
          <label for="firstname" class="text-sm">First Name</label>
          <input
            type="text"
            name="firstname"
            id="firstname"
            class="text-white bg-pgray/50 focus:outline-none focus:border focus:border-pgreen font-normal w-full rounded border border-white/30 pl-3 h-10"
          />
        </div>
        <!-- Last name -->
        <div class="flex flex-col gap-2">
          <label for="lastname" class="text-sm">Last Name</label>
          <input
            type="text"
            name="lastname"
            id="lastname"
            class="text-white bg-pgray/50 focus:outline-none focus:border focus:border-pgreen font-normal w-full rounded border border-white/30 pl-3 h-10"
          />
        </div>
        <!-- Username -->
        <div class="flex flex-col gap-2">
          <label for="username" class="text-sm">Username</label>
          <input
            type="text"
            name="username"
            id="username"
            class="text-white bg-pgray/50 focus:outline-none focus:border focus:border-pgreen font-normal w-full rounded border border-white/30 pl-3 h-10"
          />
        </div>
        <!-- Email -->
        <div class="flex flex-col gap-2">
          <label for="email" class="text-sm">Email</label>
          <input
            type="email"
            name="email"
            id="email"
            class="text-white bg-pgray/50 focus:outline-none focus:border focus:border-pgreen font-normal w-full rounded border border-white/30 pl-3 h-10"
          />
        </div>
        <!-- Password -->
        <div class="flex flex-col gap-2">
          <label for="password">Password</label>
          <input
            type="password"
            name="password"
            id="password"
            class="text-white bg-pgray/50 focus:outline-none focus:border focus:border-pgreen font-normal w-full rounded border border-white/30 pl-3 h-10"
          />
        </div>
        <!-- Password Repeat -->
        <div class="flex flex-col gap-2">
          <label for="password2">Confirm password</label>
          <input
            type="password"
            name="password2"
            id="password2"
            class="text-white bg-pgray/50 focus:outline-none focus:border focus:border-pgreen font-normal w-full rounded border border-white/30 pl-3 h-10"
          />
        </div>
        <!-- Avatar -->
        <div class="flex flex-col gap-2">
          <label for="avatar" class="text-sm">Profile picture</label>
          <input
            type="file"
            name="avatar"
            id="avatar"
            class="text-white bg-pgray/50"
          />
        </div>
        <!-- Submit and Reset -->
        <div class="flex gap-3 items-center mt-2">
          <button
            type="submit"
            class="py-2 px-6 text-white bg-gradient-to-r from-orangeOne to-orangeTwo rounded-xl shadow-lg hover:shadow-xl text-sm"
          >
            Submit
          </button>
          <button
            type="reset"
            class="py-2 px-6 bg-pgreen text-white rounded-xl text-sm"
          >
            Reset
          </button>
        </div>
        <p class="text-xs text-gray-200 mt-2">
          Already have an account?&nbsp;
          <a href="{% url 'login' %}" class="font-bold underline text-pgreen">Login</a>
        </p>
      </form>
  </section>
</main>
{% endblock content %}
